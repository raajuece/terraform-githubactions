name: terraform Plan Approval Apply
on:
    workflow_dispatch: #it will run manually
permissions: 
    contents: read #read the content of the repository
    id-token: write #write the content of the repository
env:
    TF_WORKING_DIR: terraform #path of the terraform directory
jobs:
###########################################################
# Plan
###########################################################
  
  terraform-plan: #this is the name of the jon
    name: Terraform Plan
    runs-on: ubuntu-latest #this is the runner where the job will run
    defaults:
     run:
        working-directory: ${{ env.TF_WORKING_DIR }} #this is the path of the terraform directory
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Terraform #inside the runner we need to download terraform 
        uses: hashicorp/setup-terraform@v4
########################################################
##azure login
#######################################################
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
   
      - name: Terraform init
        run: terraform init

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
      - name: TFLint
        run: tflint --init 

      - name: TFLint
        run: tflint -f compact
        continue-on-error: true #this will continue the job even if the tflint fails
        
      - name: Terraform validate
        run: terraform validate
        
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: show plan
        run: terraform show tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan

#################################################
##approval and apply
#################################################
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan #this will run after the plan job is completed
    environment:
      name: production

    defaults:
     run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: terraform init
        run: terraform init
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4  
        with:
          name: terraform-plan
          path: terraform
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan